name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  web:
    name: Build web app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build web artifact
        run: |
          wasm-pack build --target web --out-dir pkg --release
          mkdir -p dist
          cp -r web/* dist/
          cp -r pkg dist/pkg
          rm -f dist/pkg/.gitignore dist/pkg/package.json
          tar -czf tachisnap-web-${{ github.ref_name }}.tar.gz -C dist .

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: tachisnap-web
          path: tachisnap-web-${{ github.ref_name }}.tar.gz

  cli:
    name: Build CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: tachisnap-cli-linux-x64
            binary: tachi-snap
          - os: windows-latest
            artifact: tachisnap-cli-windows-x64
            binary: tachi-snap.exe
          - os: macos-latest
            artifact: tachisnap-cli-macos
            binary: tachi-snap

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build CLI
        run: cargo build --release --bin tachi-snap

      - name: Package CLI
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item "target/release/${{ matrix.binary }}" "package/${{ matrix.binary }}"
          Copy-Item README.md package/README.md
          Compress-Archive -Path package/* -DestinationPath "${{ matrix.artifact }}-${{ github.ref_name }}.zip"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}-${{ github.ref_name }}.zip

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [web, cli]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" release-assets/* \
            --title "TachiSnap ${{ github.ref_name }}" \
            --notes "TachiSnap - Pixel Snapper for animation pixel artists. Made by TachikomaRed and smolemaru. Includes static web build and native CLI binaries for agentic usage."
